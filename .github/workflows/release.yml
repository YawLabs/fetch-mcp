name: Release

on:
  push:
    tags:
      - 'v*'

# Serialize all release runs. Tags rarely arrive back-to-back, but when they
# do, two parallel publish jobs would race on npm and one would fail with
# "cannot publish over previously published version". The group key is
# workflow-scoped (not ref-scoped) so different tags share a single queue --
# a ref-scoped key would put each tag in its own group of one and not
# serialize at all. cancel-in-progress is false so a queued run waits its
# turn instead of being killed: losing a tag's release event is worse than
# waiting a minute.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Release
        run: bash release.sh
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # No post-publish smoke test: src/index.ts has no --version handling,
      # so `npx @yawlabs/fetch-mcp@VERSION --version` would block on stdin
      # waiting for MCP JSON-RPC. release.sh's step 7 verifies via
      # `npm view` instead, which catches the "tarball didn't reach the
      # registry" failure mode. Add a `--version` subcommand to
      # src/index.ts later, then re-add a smoke test step here that
      # matches the tailscale-mcp / aws-mcp pattern.
